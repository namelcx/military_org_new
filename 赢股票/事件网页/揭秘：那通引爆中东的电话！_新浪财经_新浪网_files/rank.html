<script>
    SinaPage.loadWidget({
        trigger: {
            id: 'cj_rank_list'
        },
        require: [{
            url: '//finance.sina.com.cn/other/src/pageTools.final.js'
        },
            {
                url: '//n.sinaimg.cn/finance/fe/doT.min.js'
            },
            {
                url: '//n.sinaimg.cn/finance/fe/Tab-min.js'
            }
        ],
        onAfterLoad: function () {
            var _nowDate = (function () {
                var preFull = function (a) {
                    return ('00' + a).slice(-2)
                }
                var _t = new Date();
                var _y = _t.getFullYear();
                var _m = preFull(_t.getMonth() + 1);
                var _d = preFull(_t.getDate());
                return _y + _m + _d;
            })()
            //获取列表函数
            function randerList(index, me) {
                if (index == 3) return;
                var _curBtn = $(me.doms.tabs[index]);
                var utlconf = _curBtn.attr('data-url');
                var url = '//top.finance.sina.com.cn/ws/GetTopDataList.php?top_type=day&top_time=' + _nowDate + '&get_new=1&top_show_num=5&top_order=DESC&' + utlconf;
                new PageTool.TPLRander({
                    tplId: 'TPL_Rank_List',//dot模板id
                    wrap: 'tab11_cont0' + (index + 1),//domId
                    api: url,//接口地址
                    dataType: 'jsonp',
                    apiData: {},//请求参数
                    hasData: function (m) {//判断返回值是否有数据
                        var ret;
                        if (m && m.data.length > 0) {
                            ret = true;
                        } else {
                            ret = false;
                        }
                        return ret;//默认失败
                    },//是否返回成功
                    formatData: function (m) {
                        var data = m.data;
                        for (var i = 0; i < data.length; i++) {
                            var j = i + 1;
                            var _it = data[i];
                            _it['isHot'] = '';
                            var reg = /<font color=(.*?)>(.*?)<[\/]font>/igm;
                            var title = _it['title'];
                            if (j <= 3) {
                                _it['isHot'] = 'rankhot';
                            }
                            j = j == 10 ? 10 : '0' + j;
                            _it['num'] = j;
                            if (reg.test(title)) {
                                _it['title'] = title.replace(reg, "\$2");
                            }
                        }
                        return data;
                    },//自定义数据格式化
                    onSuccess: function (m) {
                        _curBtn.attr('data-loaded', '1');
                    },//成功回调
                    onError: function (m) {
                    }//失败回调
                });
            }

            //实例化tab标签
            var tab1 = new Tab({
                bonds: [
                    ['tab11_btn01', 'tab11_cont01'],
                    ['tab11_btn02', 'tab11_cont02'],
                    ['tab11_btn03', 'tab11_cont03'],
                    ['tab11_btn04', 'tab11_cont04']
                ], // 绑定dom，复杂数组格式，每组一对
                selected: 'tabs-cur', // 选择项的className，默认值"tab_selected"
                trigger: 'mouseover', // 触发条件，默认值"mouseover"
                onRender: function () {
                    var me = this;
                    randerList(0, me)
                },
                onAfter: function (to) {
                    var me = this;
                    var _curBtn = $(me.doms.tabs[to]);
                    if (_curBtn.attr('data-loaded') != 1) {
                        randerList(to, me)
                    }
                }
            });
        }
    });
</script>
